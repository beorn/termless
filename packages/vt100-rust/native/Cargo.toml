[package]
name = "termless-vt100-rust-native"
version = "0.1.0"
edition = "2021"
description = "napi-rs bindings for vt100 Rust crate"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "3", features = ["napi8"] }
napi-derive = "3"
vt100 = "0.15"

[build-dependencies]
napi-build = "2"
