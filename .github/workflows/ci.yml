name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bun-version: [latest]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.51
      - run: bun install
      - run: cd packages/libvterm && bash build/build.sh
      - run: bun vitest run
      - run: bun run typecheck
