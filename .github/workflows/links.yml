name: links

# Per-PR link checking via lychee. The cheapest fast-feedback layer for
# broken links in repo docs; complements the cross-site /marketing
# link-check (monthly cadence, catches bit-rot from external sites).
#
# Shared accept/exclude args keep per-PR and monthly checks aligned —
# a link should not pass per-PR but fail monthly.
#
# Tracked at @km/infra/14942-lychee-action-rollout.

on:
  pull_request:
    paths: ["**/*.md", "**/*.html", "docs/**"]
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          # --root-dir lets lychee parse VitePress root-relative paths
          # (/guide/…, /api/…) without erroring "Cannot convert path to
          # URI". --exclude '^file:' then skips the resulting file://
          # checks — VitePress already validates internal links at build
          # time; lychee's job here is external link rot. The CHANGELOG
          # exclude swallows v0.0.1 placeholder GitHub URLs that don't
          # exist yet (compare/v0.0.1, releases/tag/v0.0.1).
          args: |
            --max-concurrency 24
            --no-progress
            --root-dir '${{ github.workspace }}/docs'
            --accept '200..=204,206,301,302,303,307,308,403,429'
            --exclude '^(mailto|tel|javascript):'
            --exclude '^file:'
            --exclude 'github\.com/.*/(compare|releases/tag)/v0\.0\.1'
            './**/*.md'
            './**/*.html'
          fail: true
