name: Verify Publishable

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "23"
      - run: npm install -g pnpm
      - run: bun install

      - name: Build all packages
        run: |
          for dir in . packages/*; do
            [ -f "$dir/package.json" ] || continue
            name=$(node -e "console.log(require('./$dir/package.json').name)")
            private=$(node -e "const p=require('./$dir/package.json'); console.log(p.private || false)")
            has_tsdown=$(node -e "const p=require('./$dir/package.json'); console.log(!!p.tsdown)")
            [ "$private" = "true" ] && continue
            [ "$has_tsdown" = "false" ] && continue
            echo "📦 Building $name..."
            (cd "$dir" && npx tsdown --no-dts 2>&1) || echo "⚠ Build failed for $name"
          done

      - name: Pack all tarballs
        run: |
          mkdir -p /tmp/tarballs
          for dir in . packages/*; do
            [ -f "$dir/package.json" ] || continue
            private=$(node -e "const p=require('./$dir/package.json'); console.log(p.private || false)")
            [ "$private" = "true" ] && continue
            (cd "$dir" && pnpm pack 2>/dev/null) || true
            tgz=$(ls "$dir"/*.tgz 2>/dev/null | head -1)
            [ -n "$tgz" ] && mv "$tgz" /tmp/tarballs/
          done
          echo "Packed tarballs:"
          ls /tmp/tarballs/

      - name: Install all tarballs together and verify
        run: |
          set -e
          tmpdir=$(mktemp -d)
          cd "$tmpdir"
          npm init -y --quiet 2>/dev/null
          npm install /tmp/tarballs/*.tgz --no-save 2>&1
          echo "✓ All tarballs installed together"

          for dir in . packages/*; do
            [ -f "$GITHUB_WORKSPACE/$dir/package.json" ] || continue
            name=$(node -e "console.log(require('$GITHUB_WORKSPACE/$dir/package.json').name)")
            private=$(node -e "const p=require('$GITHUB_WORKSPACE/$dir/package.json'); console.log(p.private || false)")
            [ "$private" = "true" ] && continue

            node -e "import('$name').then(m => console.log('✓ $name:', Object.keys(m).slice(0,3).join(', ')))" 2>&1 || {
              echo "❌ import('$name') failed"
              exit 1
            }
          done

          rm -rf "$tmpdir"
          echo "✓ All packages verified"
